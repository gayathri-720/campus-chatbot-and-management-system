<!DOCTYPE html>
<html>
<head>
    <title>Select Internal Marks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard-bg">

<div class="header">
    <div class="header-text">
        <h1>Internal Examination</h1>
        <p>Select Class Details</p>
    </div>
</div>

<div class="center-container">
    <div class="white-card">

        <h2>Internal Marks</h2>

        <form method="post">

            <div class="form-row">
                <label>Course</label>
                <select name="course" required>
                    <option>select course</option>
                    <option>B.Tech</option>
                    <option>M.Tech</option>
                    <option>MBA</option>
                    <option>Diploma</option>

                </select>
            </div>

            <div class="form-row">
                <label>Year</label>
                <select name="year" required>
                    <option>select year</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>
            </div>

            <div class="form-row">
                <label>Branch</label>
                <select name="branch" required>
                    <option>select branch</option>
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>AI&ML</option>
                    <option>AI&DS</option>
                </select>
            </div>

            <div class="form-row">
                <label>Section</label>
                <select name="section" required>
                    <option>select section</option>
                    <option>A</option>
                    <option>B</option>
                </select>
            </div>

            <!-- ✅ NEW MID SELECTION -->
            <div class="form-row">
                <label>Mid Exam</label>
                <select name="mid" required>
                    <option value="">Select mid</option>
                    <option value="MID-1">Mid 1</option>
                    <option value="MID-2">Mid 2</option>
                </select>
            </div>

            <button type="submit">Next</button>

        </form>
       <a class="outline-btn" href="/faculty_dashboard">⬅ Back To Dashboard</a>
    </div>
</div>

</body>
</html>
